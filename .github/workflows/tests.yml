name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # The test suite mocks the Ollama server, so we only need the local
        # libraries (numpy + pypdf) — no Ollama install required in CI.
        run: pip install numpy pypdf

      - name: Run tests
        run: python test_localmind.py
